services:
  # MySQL database
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-thinktank_root_pw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-thinktank}
      MYSQL_USER: ${MYSQL_USER:-thinktank}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-thinktank_pw}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-thinktank}:${MYSQL_PASSWORD:-thinktank_pw}@db:3306/${MYSQL_DATABASE:-thinktank}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-me}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_APP_ID: ${VITE_APP_ID:-local}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
